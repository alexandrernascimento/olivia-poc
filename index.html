<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLÍV-IA | GNPW</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-Rep_waV1MCB-tO8C3daIdmHGJIQS8N4",
      authDomain: "olivia-poc.firebaseapp.com",
      projectId: "olivia-poc",
      storageBucket: "olivia-poc.firebasestorage.app",
      messagingSenderId: "28820075425",
      appId: "1:28820075425:web:6f2e5015faa9718d4e91e0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const allowedUsers = [
      "alexandre.rnascimento@gmail.com",
      "contato.shirleicorreia@gmail.com"
    ];

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function addMessage(sender, message, color = "#000") {
      const chat = document.getElementById("chatMessages");
      const safeMessage = escapeHtml(message);

      chat.innerHTML += `
        <div style="margin-bottom:10px; color:${color};">
          <b>${sender}:</b> ${safeMessage}
        </div>
      `;

      chat.scrollTop = chat.scrollHeight;
    }

    window.login = async function () {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        if (allowedUsers.includes(user.email)) {
          document.getElementById("loginBox").style.display = "none";
          document.getElementById("chatBox").style.display = "block";
          document.getElementById("userEmail").textContent = "Conectado como: " + user.email;
        } else {
          await signOut(auth);
          alert("Seu e-mail não está autorizado para usar a OLÍV-IA. Essa é uma inteligência artificial privada, contate o administrador do sistema.");
        }
      } catch (error) {
        console.error(error);
        alert("Erro no login.");
      }
    };

    window.logoutUser = async function () {
      await signOut(auth);
      document.getElementById("chatBox").style.display = "none";
      document.getElementById("loginBox").style.display = "block";
    };

    window.enviarPergunta = async function () {
      const input = document.getElementById("chatInput");
      const pergunta = input.value.trim();

      if (!pergunta) return;

      addMessage("Você", pergunta);
      input.value = "";

      try {
        const response = await fetch("https://olivia-backend-1bbd.onrender.com/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: pergunta
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Erro ao consultar a OLÍV-IA.");
        }

        addMessage("OLÍV-IA", data.reply || "Não consegui responder no momento.", "#0e8fa3");
      } catch (error) {
        console.error(error);
        addMessage("Erro", "Não consegui responder no momento.", "red");
      }
    };

    window.handleEnter = function (event) {
      if (event.key === "Enter") {
        enviarPergunta();
      }
    };
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background-image: url("background.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center bottom;
      background-color: #f4f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 420px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      text-align: center;
      transform: translateX(-56px);
    }

    .title {
      font-size: 36px;
      color: #4d2c91;
      margin: 0;
    }

    .subtitle {
      margin-bottom: 30px;
      color: #6a5f8a;
    }

    .google-btn {
      width: 100%;
      border: 1px solid #dadce0;
      background: #fff;
      border-radius: 10px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }

    .google-btn img {
      width: 20px;
    }

    .chat-area {
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      margin-bottom: 12px;
      height: 240px;
      overflow: auto;
      text-align: left;
    }

    .chat-input {
      width: 100%;
      height: 40px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    .action-btn {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: #0e8fa3;
      color: #fff;
      cursor: pointer;
      margin-bottom: 8px;
    }

    #userEmail {
      margin-bottom: 12px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="card">
    <div id="loginBox">
      <h1 class="title">OLÍV-IA</h1>
      <p class="subtitle">Inteligência que lidera decisões</p>

      <button class="google-btn" onclick="login()">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
        Entrar com Google
      </button>
    </div>

    <div id="chatBox" style="display:none">
      <h2>OLÍV-IA</h2>
      <div id="userEmail"></div>

      <div id="chatMessages" class="chat-area">
        <div style="margin-bottom:10px; color:#0e8fa3;">
          <b>OLÍV-IA:</b> Olá, como posso ajudar?
        </div>
      </div>

      <input
        id="chatInput"
        class="chat-input"
        placeholder="Pergunte algo..."
        onkeypress="handleEnter(event)"
      >

      <button class="action-btn" onclick="enviarPergunta()">Enviar</button>
      <button class="action-btn" onclick="logoutUser()">Sair</button>
    </div>
  </div>
</body>

</html>
