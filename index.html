<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLÍV-IA | GNPW</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-Rep_waV1MCB-tO8C3daIdmHGJIQS8N4",
      authDomain: "olivia-poc.firebaseapp.com",
      projectId: "olivia-poc",
      storageBucket: "olivia-poc.firebasestorage.app",
      messagingSenderId: "28820075425",
      appId: "1:28820075425:web:6f2e5015faa9718d4e91e0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const allowedUsers = [
      "alexandre.rnascimento@gmail.com"
    ];

    window.login = async function () {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        if (allowedUsers.includes(user.email)) {
          document.getElementById("loginBox").style.display = "none";
          document.getElementById("chatBox").style.display = "block";
          document.getElementById("userEmail").textContent = "Conectado como: " + user.email;
        } else {
          await signOut(auth);
          alert("Seu email não está autorizado para usar a OLÍV-IA.");
        }
      } catch (error) {
        console.error(error);
        alert("Não foi possível realizar o login.");
      }
    };

    window.logoutUser = async function () {
      try {
        await signOut(auth);
        document.getElementById("chatBox").style.display = "none";
        document.getElementById("loginBox").style.display = "block";
      } catch (error) {
        console.error(error);
      }
    };

    window.enviarPergunta = async function () {
      const input = document.getElementById("chatInput");
      const chat = document.getElementById("chatMessages");
      const pergunta = input.value.trim();

      if (!pergunta) return;

      chat.innerHTML += `<div class="msg user"><strong>Você:</strong> ${pergunta}</div>`;
      input.value = "";

      try {
        const response = await fetch("https://olivia-backend-1bbd.onrender.com/perguntar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ pergunta })
        });

        const data = await response.json();

        chat.innerHTML += `<div class="msg bot"><strong>OLÍV-IA:</strong> ${data.resposta}</div>`;
        chat.scrollTop = chat.scrollHeight;
      } catch (error) {
        console.error(error);
        chat.innerHTML += `<div class="msg bot"><strong>OLÍV-IA:</strong> Não consegui processar sua solicitação agora.</div>`;
      }
    };

    window.handleEnter = function(event) {
      if (event.key === "Enter") {
        enviarPergunta();
      }
    };
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background-image: url("background.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center bottom;
      background-color: #f4f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      text-align: center;
      transform: translateX(-56px);
    }

    .title {
      margin: 0;
      font-size: 36px;
      color: #4d2c91;
      font-weight: bold;
    }

    .subtitle {
      margin-bottom: 30px;
      color: #6a5f8a;
    }

    .google-btn {
      width: 100%;
      border: 1px solid #dadce0;
      background: #fff;
      color: #3c4043;
      border-radius: 10px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: 0.2s;
    }

    .google-btn:hover {
      background: #f8f9fa;
    }

    .google-btn img {
      width: 20px;
    }

    #chatBox {
      display: none;
      text-align: left;
    }

    .chat-title {
      margin: 0 0 10px 0;
      color: #4d2c91;
      font-size: 22px;
      text-align: center;
    }

    .status {
      font-size: 14px;
      margin-bottom: 12px;
      color: #555;
      word-break: break-word;
    }

    .chat-area {
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      margin-bottom: 12px;
      height: 260px;
      overflow-y: auto;
    }

    .msg {
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .msg.user {
      color: #333;
    }

    .msg.bot {
      color: #0e8fa3;
    }

    .chat-input {
      width: 100%;
      height: 42px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .action-btn {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #0e8fa3;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .action-btn:hover {
      background: #0c7d8f;
    }

    @media (max-width: 768px) {
      body {
        background-size: 95% auto;
        background-position: center bottom;
        align-items: flex-start;
        padding-top: 40px;
      }

      .card {
        max-width: 360px;
        padding: 26px 20px;
        transform: none;
      }

      .title {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="card">
      <div id="loginBox">
        <h1 class="title">OLÍV-IA</h1>
        <p class="subtitle">Inteligência que lidera decisões</p>

        <button class="google-btn" onclick="login()">
          <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" />
          Entrar com Google
        </button>
      </div>

      <div id="chatBox">
        <h2 class="chat-title">OLÍV-IA</h2>
        <div id="userEmail" class="status"></div>

        <div id="chatMessages" class="chat-area">
          <div class="msg bot"><strong>OLÍV-IA:</strong> Ambiente autenticado com sucesso. Faça uma pergunta.</div>
        </div>

        <input
          id="chatInput"
          class="chat-input"
          type="text"
          placeholder="Pergunte algo para a OLÍV-IA"
          onkeypress="handleEnter(event)"
        />

        <button class="action-btn" onclick="enviarPergunta()">Enviar</button>
        <button class="action-btn" onclick="logoutUser()">Sair</button>
      </div>
    </div>
  </div>
</body>
</html>
